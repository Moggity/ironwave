name: CI

# Fast, no-build checks for a plain Node + vanilla-JS app. Runs on every push
# and pull request. The app lives in app/, so every step runs there.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # engines.node is >=18; verify the floor and a current LTS.
        node: [18, 20]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Syntax-check every source file. Catches the parse-level breakage that a
      # no-build vanilla-JS project would otherwise only hit at runtime.
      - name: Syntax check
        run: |
          for f in *.js test/*.js; do
            [ -e "$f" ] || continue
            node --check "$f"
          done

      # Runs the npm "test" script when one exists (it lands with the test
      # suite). Until then this is a clean no-op, so CI is green on a tree that
      # has the workflow but not yet the tests.
      - name: Test
        run: npm test --if-present
